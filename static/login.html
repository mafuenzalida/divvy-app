<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Divvy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #1a1a24;
            --accent: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #2d2d3a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 55%);
            pointer-events: none;
            z-index: -1;
        }
        .box {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p.sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }
        input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #12121a;
            color: var(--text);
            font: inherit;
            margin-bottom: 1rem;
        }
        button, .link-btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-top: 0.25rem;
        }
        button.primary {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
        }
        button.ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            margin-top: 0.75rem;
        }
        .msg { font-size: 0.88rem; margin-top: 1rem; min-height: 1.25em; }
        .msg.ok { color: var(--success); }
        .msg.err { color: var(--danger); }
        .nav { margin-top: 1.5rem; text-align: center; }
        .nav a { color: var(--accent); text-decoration: none; font-size: 0.95rem; }
        .nav a:hover { text-decoration: underline; }
        #signed-in { display: none; }
        #signed-out { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Cuenta</h1>
        <p class="sub">Te enviamos un enlace mágico al correo (válido unos minutos).</p>

        <div id="signed-in">
            <p class="sub" id="who" style="margin-bottom:1rem;"></p>
            <a href="/app" class="link-btn primary" style="display:block;text-align:center;text-decoration:none;margin-top:0;">Ver mis boletas</a>
            <button type="button" class="ghost" id="logout-btn">Cerrar sesión</button>
            <div class="nav"><a href="/app?new=1">Nueva boleta</a> · <a href="/">Inicio</a></div>
        </div>

        <div id="signed-out">
            <form id="form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@email.com">
                <button type="submit" class="primary">Enviar enlace</button>
            </form>
            <p class="msg" id="msg"></p>
            <div class="nav"><a href="/app">Volver a la app</a> · <a href="/">Inicio</a></div>
        </div>
    </div>
    <script>
        const msg = document.getElementById('msg');
        const signedIn = document.getElementById('signed-in');
        const signedOut = document.getElementById('signed-out');

        async function refresh() {
            msg.textContent = '';
            msg.className = 'msg';
            try {
                const r = await fetch('/api/me', { credentials: 'same-origin' });
                const d = await r.json();
                if (d.authenticated && d.user) {
                    signedIn.style.display = 'block';
                    signedOut.style.display = 'none';
                    document.getElementById('who').textContent = 'Sesión: ' + d.user.email;
                } else {
                    signedIn.style.display = 'none';
                    signedOut.style.display = 'block';
                }
            } catch (e) {
                signedIn.style.display = 'none';
                signedOut.style.display = 'block';
            }
        }

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            msg.className = 'msg';
            try {
                const r = await fetch('/api/auth/request-magic-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ email }),
                });
                const d = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(typeof d.detail === 'string' ? d.detail : 'No se pudo enviar');
                msg.textContent = 'Revisa tu correo (y spam) para el enlace.';
                msg.classList.add('ok');
            } catch (err) {
                msg.textContent = err.message || 'Error';
                msg.classList.add('err');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
            await refresh();
        });

        refresh();
    </script>
</body>
</html>
